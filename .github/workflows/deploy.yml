name: deploy
# Manual approval (production environment) -> sync secrets -> SSH -> deploy.sh. Independent of
# the appointments product: own repo, own container (port 8090). cpmai + clinic-saas untouched.
# Admin/session secrets come from the `production` environment secrets (ADMIN_PASSWORD,
# SESSION_SECRET), not from any committed file.
on:
  push: { branches: [main] }
  workflow_dispatch:
concurrency: { group: tovaitech-site-deploy, cancel-in-progress: false }
permissions: { contents: read }
jobs:
  deploy:
    name: Deploy company site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://tovaitech.in
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${{ secrets.VPS_HOST_KEY }}" ]; then
            printf '%s\n' "${{ secrets.VPS_HOST_KEY }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts
      - name: Sync secrets to VPS
        # Render deploy/.env on the VPS from GitHub *environment* secrets. Values are
        # expanded by printf and streamed over SSH stdin — never placed on the command
        # line or written into the workflow, and masked in logs by Actions.
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          printf 'ADMIN_PASSWORD=%s\nSESSION_SECRET=%s\n' "$ADMIN_PASSWORD" "$SESSION_SECRET" \
            | ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
                "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                'set -e; mkdir -p /opt/tovaitech-site/deploy; umask 077; cat > /opt/tovaitech-site/deploy/.env'
      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'set -e; cd /opt/tovaitech-site && bash scripts/vps/deploy.sh'
      - name: Post-deploy public smoke
        run: curl -fsS https://tovaitech.in/ | grep -qi 'tovaitech'
