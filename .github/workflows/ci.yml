name: ci
on: { pull_request: {} }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: html present + uses shared stylesheet
        run: test -f public/index.html && grep -q 'styles/app.css' public/index.html
      - name: optional HTML lint (advisory)
        run: npx --yes htmlhint "public/**/*.html" || true
