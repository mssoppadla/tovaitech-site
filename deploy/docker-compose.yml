# Tovaitech company site — standalone static stack. Own compose project + own host port (8090),
# fully independent of the appointments product (clinic-saas) and cpmai. Deploying this restarts
# ONLY this container.
name: tovaitech-site
services:
  site:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["8090:80"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/srv/site:ro
